<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-light: #fff0f5;
            --pink-accent: #ffb6c1;
            --gold: #d4af37;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--pink-light);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Анимация сердечек на фоне */
        .heart-bg {
            position: absolute;
            color: var(--pink-accent);
            opacity: 0.5;
            font-size: 20px;
            animation: float 6s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 2px solid var(--gold);
            max-width: 90%;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #d44d61;
            font-size: 2.5rem;
            margin-bottom: 30px;
            transition: opacity 0.5s ease;
        }

        .phrase {
            height: 20px;
            margin-bottom: 20px;
            color: var(--gold);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .btn-yes {
            background-color: var(--white);
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            position: relative;
        }

        .btn-yes:hover {
            background-color: var(--gold);
            color: var(--white);
            transform: scale(1.05);
        }

        /* Музыкальный контроллер */
        .music-ctrl {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .music-btn {
            background: none;
            border: 1px solid var(--gold);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: 0.3s;
        }

        /* Конфетти частицы */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: var(--gold);
            z-index: 100;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .btn-yes { position: static !important; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="phrase" id="phraseText"></div>
        <h1 id="mainTitle">Ты меня любишь?</h1>
        <button class="btn-yes" id="yesBtn">Да!</button>
    </div>

    <div class="music-ctrl">
        <button class="music-btn" id="musicToggle">♪</button>
        <audio id="bgMusic" loop>
            <source src="ССЫЛКА_НА_МУЗЫКУ.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const mainTitle = document.getElementById('mainTitle');
        const phraseText = document.getElementById('phraseText');
        const bgMusic = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        
        let escapeCount = 0;
        const maxEscapes = 10;
        const phrases = [
            "Ой, не поймаешь! 😋",
            "Почти! 💖",
            "Ну же, постарайся! ✨",
            "Хи-хи, мимо! 🎀",
            "Упс! Далеко я! 🌸",
            "Кнопочка убегает... 🏃‍♀️",
            "Лови её! 💝",
            "Ещё чуть-чуть! 🍯",
            "Уже близко! ⭐",
            "Последняя попытка! 🔥"
        ];

        // Проверка сохраненного прогресса
        if (localStorage.getItem('isInLove') === 'true') {
            showFinalState();
        }

        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        }

        function moveButton() {
            if (isMobile() || escapeCount >= maxEscapes) return;

            const x = Math.random() * (window.innerWidth - yesBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - yesBtn.offsetHeight - 50);
            
            yesBtn.style.position = 'fixed';
            yesBtn.style.left = x + 'px';
            yesBtn.style.top = y + 'px';

            phraseText.innerText = phrases[escapeCount];
            escapeCount++;

            if (escapeCount === maxEscapes) {
                setTimeout(() => {
                    phraseText.innerText = "Ладно, ладно, сдаюсь! 🥰";
                }, 500);
            }
        }

        yesBtn.addEventListener('mouseover', moveButton);
        yesBtn.addEventListener('click', () => {
            if (escapeCount >= maxEscapes || isMobile()) {
                localStorage.setItem('isInLove', 'true');
                showFinalState();
                createConfetti();
            }
        });

        function showFinalState() {
            mainTitle.innerHTML = "Я тебя тоже люблю! ❤️";
            yesBtn.style.display = 'none';
            phraseText.style.display = 'none';
            document.body.style.backgroundColor = '#fff';
            document.querySelector('.container').style.border = '3px solid var(--pink-accent)';
        }

        // Создание фоновых сердечек
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }
        setInterval(createHeart, 400);

        // Музыкальный плеер
        let isPlaying = false;
        musicToggle.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                musicToggle.innerText = '♪';
            } else {
                bgMusic.play().catch(() => alert("!"));
                musicToggle.innerText = '⏸';
            }
            isPlaying = !isPlaying;
        });

        // Эффект конфетти
        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = i % 2 === 0 ? '#d4af37' : '#ffb6c1';
                conf.style.top = '-10px';
                conf.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(conf);

                const duration = Math.random() * 3 + 2;
                conf.animate([
                    { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                    { transform: `translateY(100vh) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    easing: 'ease-out'
                });

                setTimeout(() => conf.remove(), duration * 1000);
            }
        }
    </script>
</body>
</html>
